<!DOCTYPE html>
<html>
<head>
<title>Working Glass Login</title>

<style>
body {
  margin: 0;
  height: 100vh;

  /* strong background so you can SEE it */
  background: linear-gradient(135deg, #ffd1dc, #ff7fa3);
  font-family: Arial;
}

/* LEFT LOGIN BOX */
.login-box {
  position: fixed;
  left: 0;
  top: 0;

  width: 50vw;
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  /* IMPORTANT: visible translucent look */
  background: rgba(255, 255, 255, 0.35);

  border-right: 2px solid white;
}

input {
  width: 70%;
  padding: 12px;
  margin: 8px;
  border: none;
  outline: none;
}

button {
  width: 70%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Sign in with email</h2>
  <input placeholder="Email">
  <input placeholder="Password">
  <button>Sign In</button>
</div>

</body>
</html>
