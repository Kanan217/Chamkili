.grid{

}

/* SAME CARD STYLE */
.card{
    background:white;
    border-radius:15px;
    overflow:hidden;

    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{

    height:280px;

}

.card-content{

}

.card h3{

}

.card p{

}

.btn{

    border:none;
    padding:10px 35px;
    border-radius:50px;

}
