<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamkili | Luxury Jewellery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5E8D8;font-family:Poppins,sans-serif}
header{
position:fixed;top:0;width:100%;padding:20px 8%;
display:flex;justify-content:space-between;align-items:center;
background:rgba(255,255,255,.7);backdrop-filter:blur(10px);z-index:1000}
.menu-btn{font-size:32px;cursor:pointer}
.side-menu{
position:fixed;left:-320px;top:0;width:320px;height:100%;
background:#F5E8D8;padding-top:100px;transition:.4s;z-index:2000}
.side-menu a{
display:block;padding:20px 40px;font-size:28px;
font-family:'Cormorant Garamond',serif;color:black;text-decoration:none}
.closebtn{position:absolute;top:20px;right:30px;font-size:40px;cursor:pointer}
.hero{height:100vh;display:flex;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:5rem;font-family:'Cormorant Garamond',serif}
.collections{padding:100px 8%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px}
.card{background:white;border-radius:20px;padding:20px}
footer{background:#111;color:white;text-align:center;padding:30px}
</style>
</head>
<body>
<header>
<div class="menu-btn" onclick="openMenu()">☰</div>
<h1>Chamkili</h1>
<div></div>
</header>

<div class="side-menu" id="menu">
<span class="closebtn" onclick="closeMenu()">×</span>
<a href="#">Naya Aaya Hai</a>
<a href="#">Chamkili Wardrobe</a>
<a href="#">Best Sellers</a>
<a href="#">Hamari Kahani</a>
</div>

<section class="hero">
<div>
<h1>For the Chamkili in You</h1>
<p>Timeless elegance and luxury jewellery.</p>
</div>
</section>

<!-- OUR LOOKS SECTION -->
<section id="looks" style="background:#f9c6dd; padding:100px 0; width:99vw; margin-left:calc(49% - 49vw);">

    <h2 style="
        text-align:center;
        font-size:42px;
        font-family:'Cormorant Garamond', serif;
        color:#7a003f;
        margin-bottom:10px;
        letter-spacing:2px;
    ">
        Spotted Being Chamkili 
    </h2>

    <p style="
        text-align:center;
        max-width:1000px;
        margin:auto;
        color:#5a2a3c;
        font-size:16px;
    ">
        Discover Chamkili’s elegant Rani Pink jewelry collection.
    </p>



<footer>© 2026 Chamkili</footer>

<script>
function openMenu(){document.getElementById('menu').style.left='0';}
function closeMenu(){document.getElementById('menu').style.left='-320px';}
</script>
</body>
</html>
