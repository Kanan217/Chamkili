<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#fff8fb;
font-family:Poppins,sans-serif;
}

header{
background:white;
padding:25px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:100;
}

header h1{
font-family:"Cormorant Garamond",serif;
font-size:42px;
color:#d67da6;
}

.subtitle{
text-align:center;
margin:40px 0;
font-size:20px;
color:#777;
}

.products{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:35px;

padding:40px;

max-width:1400px;

margin:auto;

}

.card{

background:white;

border-radius:22px;

overflow:hidden;

box-shadow:0 15px 30px rgba(0,0,0,.08);

transition:.4s;

cursor:pointer;

}

.card:hover{

transform:translateY(-10px);

box-shadow:0 20px 40px rgba(214,125,166,.35);

}

.card img{

width:100%;

height:280px;

object-fit:cover;

transition:.4s;

}

.card:hover img{

transform:scale(1.05);

}

.info{

padding:20px;

text-align:center;

}

.info h2{

font-family:"Cormorant Garamond",serif;

font-size:30px;

margin-bottom:10px;

}

.price{

color:#d67da6;

font-size:20px;

font-weight:bold;

margin-bottom:15px;

}

.view{

display:inline-block;

padding:12px 30px;

background:#6F4E37;

color:white;

text-decoration:none;

border-radius:50px;

transition:.3s;

}

.view:hover{

background:#F5E8D8;

}


</style>

</head>
