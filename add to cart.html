<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHAMKILI Luxury Cart</title>
<style>
body{margin:0;font-family:Georgia,serif;background:#f5e8d8;color:#4b2e1f}
.header{background:#6F4E37;color:#fff;padding:24px;text-align:center;font-size:32px;letter-spacing:2px}
.wrap{display:grid;grid-template-columns:2fr 1fr;gap:24px;max-width:1100px;margin:30px auto;padding:0 20px}
.card,.summary{background:#fff;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,.1);padding:20px}
.item{display:flex;align-items:center;gap:18px;border-bottom:1px solid #eee;padding:15px 0}
.img{width:90px;height:90px;background:#d9c2aa;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:36px}
.qty button,.checkout,.remove{background:#6F4E37;color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer}
.qty span{padding:0 10px}.remove{background:#a94442}.checkout{width:100%;padding:14px;font-size:18px;margin-top:15px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc}
@media(max-width:800px){.wrap{grid-template-columns:1fr}}
</style></head><body>
<div class="header">CHAMKILI • Luxury Cart</div>
<div class="wrap">
<div class="card">
<h2>Your Jewellery</h2>
<div id="items"></div>
</div>
<div class="summary">
<h2>Order Summary</h2>
<p>Items: <span id="count">0</span></p>
<p>Total: ₹<span id="total">0</span></p>
<input placeholder="Gift / Coupon Code">
<button class="checkout">Proceed to Checkout</button>
</div></div>
<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];
const items=document.getElementById("items");
function draw(){
items.innerHTML="";
let total=0;
document.getElementById("count").textContent=cart.length;
if(cart.length===0){items.innerHTML="<h3>Your cart is empty </h3>";document.getElementById("total").textContent=0;return;}
cart.forEach((p,i)=>{
total+=Number(p.price)||0;
items.innerHTML+=`<div class=item><div class=img></div><div style="flex:1"><h3>${p.name}</h3><p>₹${p.price}</p></div><button class=remove onclick="del(${i})">Remove</button></div>`;
});
document.getElementById("total").textContent=total;
}
function del(i){cart.splice(i,1);localStorage.setItem("cart",JSON.stringify(cart));draw();}
draw();
</script></body></html>
