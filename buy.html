<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamkili | Product</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#fff7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
}

img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.content{
    padding:20px;
}

h1{
    color:#d36d97;
    margin-bottom:10px;
}

.price{
    font-size:24px;
    color:#444;
    margin-bottom:20px;
    font-weight:bold;
}

button{
    width:90%;
    padding:14px;
    border:none;
    border-radius:30px;
    margin:8px 0;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.cart{
    background:#d36d97;
    color:white;
}

.buy{
    background:#222;
    color:white;
}

button:hover{
    opacity:0.9;
    transform:scale(1.03);
}
</style>

</head>
<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?w=600" alt="Ring">

<div class="content">

<h1>Diamond Ring</h1>

<p class="price">₹5,999</p>

<button class="cart">🛒 Add to Cart</button>

<button class="buy">⚡ Buy Now</button>

</div>

</div>

</body>
</html>
