<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Jewellery</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#F5E8D8;
    padding:30px;
}

h1{
    color:#333;
}

img{
    width:100%;
    max-height:400px;
    object-fit:cover;
    border-radius:10px;
}

.thumbs{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.thumbs img{
    width:70px;
    height:70px;
    cursor:pointer;
    border-radius:8px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    cursor:pointer;
    border-radius:25px;
    font-size:16px;
}

.buy{
    background:orange;
    color:white;
}

.cart{
    background:#6F4E37;
    color:white;
    margin-left:10px;
}

#toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#6F4E37;
    color:white;
    padding:15px 25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    display:none;
    z-index:9999;
}
</style>
</head>

<body>
<button onclick="history.back()" style="
position:fixed;
top:0;
left:0;
background:#6F4E37;
color:white;
border:none;
padding:10px 20px;
border-radius:0 0 10px 0;
cursor:pointer;
z-index:99999;
">
← Back
</button>
<h1>Luxury Jewellery</h1>

<img id="mainImg" src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?w=800">

<div class="thumbs">
<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?w=800" onclick="change(this.src)">
<img src="https://images.unsplash.com/photo-1602173574767-37ac01994b2a?w=800" onclick="change(this.src)">
<img src="https://images.unsplash.com/photo-1601121141461-9d6647bca1ed?w=800" onclick="change(this.src)">
<img src="https://images.unsplash.com/photo-1600721391689-2564bb8055de?w=800" onclick="change(this.src)">
</div>

<p>This is premium luxury jewellery description.</p>

<h2>₹4,999</h2>

<button style="background-color:#6F4E37; color:white;">
    Buy Now
</button>
<button class="cart" onclick="addToCart()">Add to Cart</button>

<div id="toast"> Added to Cart</div>

<script>
function addToCart(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let product = {
        name: "Luxury Jewellery",
        price: 4999,
        image: document.getElementById("mainImg").src,
        quantity: 1
    };

    let existing = cart.find(item => item.name === product.name);

    if(existing){
        existing.quantity++;
    }else{
        cart.push(product);
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    var toast = document.getElementById("toast");

    toast.style.display = "block";

    setTimeout(function(){
        toast.style.display = "none";
    },2000);
}
</script>

</body>
</html>
