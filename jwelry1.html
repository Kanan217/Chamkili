<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamkili Product</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#F5E8D8;
padding:40px 8%;
}

.product-container{
display:flex;
flex-wrap:wrap;
gap:50px;
align-items:flex-start;
}

.gallery{
flex:1;
min-width:320px;
}

.main-image{
width:100%;
height:500px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.thumbnails{
display:flex;
gap:10px;
margin-top:15px;
}

.thumbnails img{
width:80px;
height:80px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
border:2px solid transparent;
}

.thumbnails img:hover{
border-color:#ff9f68;
}

.product-info{
flex:1;
min-width:320px;
}

.product-info h1{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
margin-bottom:15px;
}

.price{
font-size:2rem;
font-weight:600;
color:#ff8c42;
margin-bottom:20px;
}

.description{
line-height:1.8;
margin-bottom:30px;
color:#333;
}

.buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.buy-btn{
background:#ff9f68;
color:black;
border:none;
padding:15px 40px;
border-radius:50px;
font-size:16px;
cursor:pointer;
font-weight:600;
}

.cart-btn{
background:white;
color:black;
border:none;
padding:15px 40px;
border-radius:50px;
font-size:16px;
cursor:pointer;
font-weight:600;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="product-container">

<div class="gallery">

<img id="mainImage"
class="main-image"
src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1000&q=80">

<div class="thumbnails">

<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1000&q=80"
onclick="changeImage(this.src)">

<img src="https://images.unsplash.com/photo-1602173574767-37ac01994b2a?auto=format&fit=crop&w=1000&q=80"
onclick="changeImage(this.src)">

<img src="https://images.unsplash.com/photo-1601121141461-9d6647bca1ed?auto=format&fit=crop&w=1000&q=80"
onclick="changeImage(this.src)">

<img src="https://images.unsplash.com/photo-1600721391689-2564bb8055de?auto=format&fit=crop&w=1000&q=80"
onclick="changeImage(this.src)">

<img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=1000&q=80"
onclick="changeImage(this.src)">

</div>

</div>

<div class="product-info">

<h1>Royal Diamond Necklace</h1>

<div class="price">₹4,999</div>

<p class="description">
A timeless piece crafted for elegance and luxury.
Designed to elevate every occasion with unmatched brilliance,
premium craftsmanship, and exquisite detailing.
Perfect for weddings, celebrations, and special moments.
</p>

<div class="buttons">

<button class="buy-btn">
Buy Now
</button>

<button class="cart-btn">
Add To Cart
</button>

</div>

</div>

</div>

<script>
function changeImage(src){
document.getElementById("mainImage").src = src;
}
</script>

</body>
</html>
